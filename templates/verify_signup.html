{% extends "base.html" %}

{% block title %}Verify Signup | JimmyElectronic{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-280px)] flex items-center justify-center py-16 px-4">
    <div class="bg-white rounded-3xl p-6 sm:p-8 md:p-12 max-w-md w-full shadow-lg border border-gray-100">
        <h2 class="text-3xl md:text-4xl font-bold mb-2 text-gray-900">Verify Email</h2>
        <p class="text-gray-500 mb-8 text-sm md:text-base">Enter the 6-digit code sent to <b>{{ email }}</b> to verify your account.</p>

        <form method="POST" action="{{ url_for('auth.verify_signup') }}">
            <div class="mb-8">
                <label class="block mb-2 font-medium text-sm text-gray-700">
                    <i class="fa-regular fa-key text-jimmy-red mr-2"></i> OTP Code
                </label>
                <input type="text" name="otp" placeholder="Enter 6-digit code" maxlength="6" required autofocus
                       class="w-full px-5 py-3 border-2 border-gray-200 rounded-full text-sm text-center tracking-[4px] font-mono text-lg focus:border-jimmy-red focus:outline-none transition">
            </div>

            <button type="submit" class="w-full bg-jimmy-red text-white py-3 rounded-full font-semibold text-base hover:bg-red-800 transition transform hover:-translate-y-0.5 shadow-md hover:shadow-lg mb-6 flex items-center justify-center gap-2">
                <i class="fa-regular fa-check-circle"></i> Verify & Login
            </button>

            <div class="text-center text-sm text-gray-600">
                Need a new code? 
                <a href="{{ url_for('auth.login') }}" class="text-jimmy-red font-semibold hover:underline ml-1">Login to resend</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Auto format OTP input (numbers only)
    const otpInput = document.querySelector('input[name="otp"]');
    if (otpInput) {
        otpInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
        });
    }
</script>
{% endblock %}
