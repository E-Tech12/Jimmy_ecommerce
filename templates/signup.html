{% extends "base.html" %}

{% block title %}Sign Up | JimmyElectronic{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-280px)] flex items-center justify-center py-16 px-4">
    <div class="bg-white rounded-3xl p-6 sm:p-8 md:p-12 max-w-lg w-full shadow-lg border border-gray-100">
        <h2 class="text-3xl md:text-4xl font-bold mb-2 text-gray-900">Create account</h2>
        <p class="text-gray-500 mb-8 text-sm md:text-base">Join JimmyElectronic & enjoy flexible payments</p>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <!-- Name row - stacks on mobile -->
            <div class="flex flex-col sm:flex-row gap-4 mb-6">
                <div class="flex-1">
                    <label class="block mb-2 font-medium text-sm text-gray-700">
                        <i class="fa-regular fa-user text-jimmy-red mr-2"></i> First Name
                    </label>
                    <input type="text" name="first_name" placeholder="John" required
                           class="w-full px-5 py-3 border-2 border-gray-200 rounded-full text-sm focus:border-jimmy-red focus:outline-none transition">
                </div>
                <div class="flex-1">
                    <label class="block mb-2 font-medium text-sm text-gray-700">
                        <i class="fa-regular fa-user text-jimmy-red mr-2"></i> Last Name
                    </label>
                    <input type="text" name="last_name" placeholder="Doe" required
                           class="w-full px-5 py-3 border-2 border-gray-200 rounded-full text-sm focus:border-jimmy-red focus:outline-none transition">
                </div>
            </div>

            <div class="mb-6">
                <label class="block mb-2 font-medium text-sm text-gray-700">
                    <i class="fa-regular fa-envelope text-jimmy-red mr-2"></i> Email address
                </label>
                <input type="email" name="email" placeholder="you@example.com" required
                       class="w-full px-5 py-3 border-2 border-gray-200 rounded-full text-sm focus:border-jimmy-red focus:outline-none transition">
            </div>

            <div class="mb-6">
                <label class="block mb-2 font-medium text-sm text-gray-700">
                    <i class="fa-regular fa-phone text-jimmy-red mr-2"></i> Phone Number
                </label>
                <input type="tel" name="phone_number" placeholder="+234 800 000 0000"
                       class="w-full px-5 py-3 border-2 border-gray-200 rounded-full text-sm focus:border-jimmy-red focus:outline-none transition">
            </div>

            <div class="mb-6">
                <label class="block mb-2 font-medium text-sm text-gray-700">
                    <i class="fa-regular fa-location-dot text-jimmy-red mr-2"></i> Address
                </label>
                <input type="text" name="address" placeholder="Your delivery address"
                       class="w-full px-5 py-3 border-2 border-gray-200 rounded-full text-sm focus:border-jimmy-red focus:outline-none transition">
            </div>

            <div class="mb-6">
                <label class="block mb-2 font-medium text-sm text-gray-700">
                    <i class="fa-regular fa-lock text-jimmy-red mr-2"></i> Password
                </label>
                <input type="password" name="password" placeholder="Create a strong password" required
                       class="w-full px-5 py-3 border-2 border-gray-200 rounded-full text-sm focus:border-jimmy-red focus:outline-none transition">
            </div>

            <button type="submit" class="w-full bg-jimmy-red text-white py-3 rounded-full font-semibold text-base hover:bg-red-800 transition transform hover:-translate-y-0.5 shadow-md hover:shadow-lg mb-6 flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus"></i> Sign Up
            </button>

            <div class="text-center text-sm text-gray-600">
                Already have an account?
                <a href="{{ url_for('auth.login') }}" class="text-jimmy-red font-semibold hover:underline ml-1">Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
