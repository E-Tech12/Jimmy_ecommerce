{% extends "base.html" %}

{% block title %}Reset Password | JimmyElectronic{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-280px)] flex items-center justify-center py-16 px-4">
    <div class="bg-white rounded-3xl p-6 sm:p-8 md:p-12 max-w-md w-full shadow-lg border border-gray-100">
        <h2 class="text-3xl md:text-4xl font-bold mb-2 text-gray-900">Reset password</h2>
        <p class="text-gray-500 mb-8 text-sm md:text-base">Create a new strong password for your account.</p>

        <form method="POST" action="{{ url_for('auth.reset_password') }}" id="resetForm">
            <div class="mb-6">
                <label class="block mb-2 font-medium text-sm text-gray-700">
                    <i class="fa-regular fa-lock text-jimmy-red mr-2"></i> New Password
                </label>
                <input type="password" name="password" id="password" placeholder="Enter new password" required autofocus
                       class="w-full px-5 py-3 border-2 border-gray-200 rounded-full text-sm focus:border-jimmy-red focus:outline-none transition">
            </div>

            <div class="mb-8">
                <label class="block mb-2 font-medium text-sm text-gray-700">
                    <i class="fa-regular fa-lock text-jimmy-red mr-2"></i> Confirm Password
                </label>
                <input type="password" name="confirm_password" id="confirmPassword" placeholder="Confirm your new password" required
                       class="w-full px-5 py-3 border-2 border-gray-200 rounded-full text-sm focus:border-jimmy-red focus:outline-none transition">
            </div>

            <button type="submit" class="w-full bg-jimmy-red text-white py-3 rounded-full font-semibold text-base hover:bg-red-800 transition transform hover:-translate-y-0.5 shadow-md hover:shadow-lg mb-6 flex items-center justify-center gap-2">
                <i class="fa-regular fa-floppy-disk"></i> Reset Password
            </button>

            <div class="text-center text-sm text-gray-600">
                <a href="{{ url_for('auth.login') }}" class="text-jimmy-red font-semibold hover:underline">Back to Login</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Password confirmation check
    const form = document.getElementById('resetForm');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');

    if (form) {
        form.addEventListener('submit', function(e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                alert('❌ Passwords do not match! Please try again.');
                confirmPassword.style.borderColor = '#ef4444';
                password.style.borderColor = '#ef4444';
            } else if (password.value.length < 6) {
                e.preventDefault();
                alert('❌ Password must be at least 6 characters long.');
                password.style.borderColor = '#ef4444';
            } else {
                confirmPassword.style.borderColor = '#e0e0e0';
                password.style.borderColor = '#e0e0e0';
            }
        });

        // Remove red border when user starts typing
        confirmPassword.addEventListener('input', function() {
            this.style.borderColor = '#e0e0e0';
            password.style.borderColor = '#e0e0e0';
        });
        
        password.addEventListener('input', function() {
            this.style.borderColor = '#e0e0e0';
            confirmPassword.style.borderColor = '#e0e0e0';
        });
    }
</script>
{% endblock %}
